---
- name: Deploy FreeSWITCH FASE 1 em Docker
  hosts: localhost
  connection: local
  become: yes

  vars:
    project_dir: /opt/freeswitch-midia-fullduplex
    freeswitch_conf_src: /opt/freeswitch/conf
    freeswitch_sounds_src: /opt/freeswitch/sounds

  tasks:

    - name: Instalar dependências Python do Ansible para Docker
      ansible.builtin.apt:
        name:
          - python3-docker
          - docker-compose-plugin
        state: present
        update_cache: yes

    - name: Garantir que o Docker está rodando
      ansible.builtin.service:
        name: docker
        state: started
        enabled: yes

    - name: Criar diretórios de configuração e dados no host
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        mode: '0755'
        owner: root
        group: root
      loop:
        - "{{ freeswitch_conf_src }}"
        - "{{ freeswitch_sounds_src }}"
        - /opt/freeswitch/db
        - /opt/freeswitch/log
        - /opt/freeswitch/run
        - /opt/freeswitch/recordings

    - name: Verificar que o arquivo .env existe com SIGNALWIRE_TOKEN
      ansible.builtin.stat:
        path: "{{ project_dir }}/.env"
      register: env_file

    - name: Falhar se .env não existir
      ansible.builtin.fail:
        msg: >
          Arquivo .env não encontrado em {{ project_dir }}/.env
          Crie-o com: SIGNALWIRE_TOKEN=pat_xxxxx
      when: not env_file.stat.exists

    - name: Subir stack com docker compose
      community.docker.docker_compose_v2:
        project_src: "{{ project_dir }}"
        state: present
        pull: policy_missing   # só baixa imagens que não existem localmente
      environment:
        COMPOSE_PROJECT_NAME: freeswitch-midia-fullduplex